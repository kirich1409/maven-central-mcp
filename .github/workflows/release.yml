# TODO(github-releases): per-plugin GitHub Releases are intentionally deferred.
# `softprops/action-gh-release@v2` requires a tag input; on `push: branches: [main]`
# it falls back to `github.ref_name` (= `main`), which is not a release tag.
# Per-plugin git tags (`{plugin-name}--v{version}`) are still created by
# scripts/changesets-publish.mjs and serve as the public release artifact.
# Wiring up per-plugin Releases that pick the right tag(s) is a follow-up.
name: Release

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      # README only; .changeset/*.md content files MUST trigger.
      - '.changeset/README.md'

# Queue concurrent runs, do NOT cancel — mid-publish cancellation is the
# worst-case state (npm publish may have succeeded but tags not pushed).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      published: ${{ steps.changesets.outputs.published }}
      publishedPackages: ${{ steps.changesets.outputs.publishedPackages }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history needed so the per-plugin tag idempotency check in
          # scripts/changesets-publish.mjs sees prior tags.
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - name: Validate marketplace and plugin configurations
        run: bash scripts/validate.sh

      - name: Build maven-mcp
        run: |
          npm --workspace plugins/maven-mcp run lint
          npm --workspace plugins/maven-mcp run test
          npm --workspace plugins/maven-mcp run build

      - name: Create Version PR or publish via Changesets
        id: changesets
        uses: changesets/action@v1
        with:
          version: node scripts/changesets-version.mjs
          publish: node scripts/changesets-publish.mjs
          commit: "Version Packages"
          title: "Version Packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
