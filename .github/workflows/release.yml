name: Release

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      # README only; .changeset/*.md content files MUST trigger.
      - '.changeset/README.md'

# Queue concurrent runs, do NOT cancel — mid-publish cancellation is the
# worst-case state (npm publish may have succeeded but tags not pushed).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      published: ${{ steps.changesets.outputs.published }}
      publishedPackages: ${{ steps.changesets.outputs.publishedPackages }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history needed so the per-plugin tag idempotency check in
          # scripts/changesets-publish.mjs sees prior tags.
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - name: Validate marketplace and plugin configurations
        run: bash scripts/validate.sh

      - name: Build maven-mcp
        working-directory: plugins/maven-mcp
        run: |
          npm ci
          npm run lint
          npm test
          npm run build

      - name: Create Version PR or publish via Changesets
        id: changesets
        uses: changesets/action@v1
        with:
          version: node scripts/changesets-version.mjs
          publish: node scripts/changesets-publish.mjs
          commit: "Version Packages"
          title: "Version Packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  github-release:
    needs: release
    if: needs.release.outputs.published == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create combined GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          make_latest: true
