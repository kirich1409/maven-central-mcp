name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-marketplace:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check all plugins are registered in marketplace.json
        run: |
          set -euo pipefail
          MARKETPLACE=".claude-plugin/marketplace.json"
          REGISTERED=$(jq -r '.plugins[].name' "$MARKETPLACE")
          MISSING=0
          for dir in plugins/*/; do
            name=$(basename "$dir")
            if ! echo "$REGISTERED" | grep -Fxq "$name"; then
              echo "ERROR: '$name' is in plugins/ but missing from $MARKETPLACE"
              MISSING=1
            fi
          done
          exit "$MISSING"

  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: plugins/maven-mcp
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: plugins/maven-mcp/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build
